services:
  llamacpp-test:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llamacpp-test
    runtime: nvidia
    ports:
      - "8080:8080"
    volumes:
      - /opt/atom/models:/models:ro
    command:
      - "-m"
      - "/models/qwen2.5-coder-14b-instruct-q4_k_m.gguf"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "-c"
      - "8192"
      - "-ngl"
      - "99"
    restart: unless-stopped