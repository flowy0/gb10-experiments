logLevel: debug
healthCheckTimeout: 300

groups:
  test-models:
    swap: true
    exclusive: true

models:
  qwen25-coder-14b:
    name: "Qwen2.5 Coder 14B Q4_K_M via llama.cpp"
    group: test-models
    ttl: 300
    cmdStop: docker stop ls-qwen25-coder-14b
    cmd: |
      docker run --rm \
      --name ls-qwen25-coder-14b \
      --runtime=nvidia \
      --network container:llama-swap-test \
      -v /opt/atom/models:/models:ro \
      ghcr.io/ggml-org/llama.cpp:server-cuda \
      -m /models/Qwen2.5-Coder-14B-Instruct-Q4_K_M.gguf \
      --host 0.0.0.0 \
      --port ${PORT} \
      -c 4096 \
      -ngl 99

