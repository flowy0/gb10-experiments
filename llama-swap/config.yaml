logLevel: debug
healthCheckTimeout: 300

groups:
    test-models:
        swap: true
        exclusive: true

    code:
        swap: true
        exclusive: true

    research:
        swap: true
        exclusive: true

    stable:
        swap: true
        exclusive: true

    summary:
        swap: true
        exclusive: true

models:
    qwen25-coder-14b:
        name: "Qwen2.5 Coder 14B Q4_K_M via llama.cpp"
        group: test-models
        ttl: 300
        cmdStop: docker stop ls-qwen25-coder-14b
        cmd: |
            docker run --rm \
            --name ls-qwen25-coder-14b \
            --runtime=nvidia \
            --network container:llama-swap \
            -v /opt/atom/models:/models:ro \
            ghcr.io/ggml-org/llama.cpp:server-cuda \
            -m /models/Qwen2.5-Coder-14B-Instruct-Q4_K_M.gguf \
            --host 0.0.0.0 \
            --port ${PORT} \
            -c 32768 \
            --cache-type-k q8_0 \
            --cache-type-v q8_0 \
            -ngl 99

