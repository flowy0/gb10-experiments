version: "3.9"

services:

  # ======================================================
  # Ollama (GPU inference layer)
  # ======================================================
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    runtime: nvidia
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    restart: unless-stopped

  # ======================================================
  # LiteLLM (API gateway)
  # ======================================================
  litellm:
    image: ghcr.io/berriai/litellm@sha256:bd4e99454c632f16e33d66c5c63f07bccb1ec3ca6202dfc3c37492aa1fe9a366
    container_name: litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm.yaml:/app/config.yaml
    command: >
      --config /app/config.yaml
      --port 4000
    depends_on:
      - ollama
    restart: unless-stopped

  # ======================================================
  # OpenWebUI (frontend)
  # ======================================================
  openwebui:
    image: ghcr.io/open-webui/open-webui:v0.9.2
    container_name: openwebui
    ports:
      - "3000:8080"
    volumes:
      - openwebui-data:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=http://litellm:4000/v1
      - OPENAI_API_KEY=sk-local
    depends_on:
      - litellm
    restart: unless-stopped

volumes:
  ollama-data:
  openwebui-data: