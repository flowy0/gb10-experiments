global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'vllm'
    static_configs:
      - targets: ['vllm-qwen36-35b-a3b-nvfp4:8000']

  - job_name: 'llama-swap'
    static_configs:
      - targets: ['llama-swap:8080']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'nvidia-gpu'
    static_configs:
      - targets: ['localhost:9400']
