  # =========================
  # vLLM - RESEARCH MODEL
  # =========================

  vllm-research:
    image: hellohal2064/vllm-dgx-spark-gb10:latest
    container_name: vllm-research
    runtime: nvidia
    shm_size: "4g"
    ports:
      - "8001:8000"
    volumes:
      - /home/g/.cache/huggingface:/root/.cache/huggingface
      - /opt/atom/models:/models
    entrypoint: ["vllm"]
    command:
      - serve
      - /models/qwen2.5-14b-instruct-awq
      - --served-model-name
      - research
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --gpu-memory-utilization
      - "0.22"
      - --max-model-len
      - "8192"
      - --enforce-eager
      - --max-num-seqs
      - "4"
      - --dtype
      - auto
      - --enable-auto-tool-choice
      - --tool-call-parser
      - hermes
    environment:
      - HF_HOME=/root/.cache/huggingface
      - VLLM_USE_FLASHINFER_MOE_FP4=0
      - VLLM_NVFP4_GEMM_BACKEND=marlin
      - VLLM_TEST_FORCE_FP8_MARLIN=1
    restart: unless-stopped
