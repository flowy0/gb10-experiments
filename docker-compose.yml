    open-webui:
        image: ghcr.io/open-webui/open-webui:main@sha256:c2e4723fdbca5de8f9f0529e22b78acf5bc312a88da730bed88860063d028fe8
        container_name: open-webui
        depends_on:
            - llama-swap
        ports:
            - "3000:8080"
        volumes:
            - open-webui-data:/app/backend/data
        environment:
            OPENAI_API_BASE_URL: http://llama-swap:8080/v1
            OPENAI_API_KEY: not-needed
            ENABLE_OLLAMA_API: "false"
            OPENAI_MODEL_LIST: '["unsloth-gemma4-26b-a4b-qat-128k-think"]'
        restart: unless-stopped

    mongodb:
        image: mongo:7
        container_name: librechat-mongodb
        env_file:
            - /opt/atom/.env
        volumes:
            - mongo-data:/data/db
        restart: unless-stopped

    librechat:
        image: ghcr.io/danny-avila/librechat:latest@sha256:a46254938507971e0d4f7ed3f9d116bd9b118f4810b5b75eb716baf575645068
        container_name: librechat
        env_file:
            - /opt/atom/.env
        depends_on:
            - mongodb
            - llama-swap
        ports:
            - "3080:3080"
        volumes:
            - ./librechat/librechat.yml:/app/librechat.yaml
            - /opt/atom/librechat/data/auth.json:/app/api/data/auth.json
            - librechat-images:/app/client/public/images
            - librechat-uploads:/app/uploads
            - librechat-logs:/app/api/logs
        environment:
            MONGO_URI: ${MONGO_URI}
            CONFIG_PATH: /app/librechat.yaml
            CREDS_KEY: ${CREDS_KEY}
            CREDS_IV: ${CREDS_IV}
            JWT_SECRET: ${JWT_SECRET}
            JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
            HOST: 0.0.0.0
            PORT: 3080
            ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
            ALLOW_EMAIL_LOGIN: ${ALLOW_EMAIL_LOGIN:-true}
            ALLOW_SOCIAL_LOGIN: ${ALLOW_SOCIAL_LOGIN:-false}
            ALLOW_SOCIAL_REGISTRATION: ${ALLOW_SOCIAL_REGISTRATION:-false}
            SERPER_API_KEY: ${SERPER_API_KEY}
            ENDPOINTS: ${ENDPOINTS}
            JINA_API_KEY: ${JINA_API_KEY}
            JINA_API_URL: ${JINA_API_URL}
        restart: unless-stopped

volumes:
    mongo-data:
    librechat-images:
    librechat-uploads:
    librechat-logs:
    open-webui-data:
