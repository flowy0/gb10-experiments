    # --- Qwen3.6-35B-A3B NVFP4 (hermes, port 8002) ---
    vllm-qwen36-35b-a3b-nvfp4:
        image: vllm-node-tf5:latest
        container_name: vllm-qwen36-35b-a3b-nvfp4
        runtime: nvidia
        shm_size: "32gb"
        ports:
            - "8000:8000"
        volumes:
            - /opt/atom/models/Qwen3.6-35B-A3B-NVFP4:/model:ro
            - /opt/atom/models/z-lab-qwen36-35b-a3b-dflash:/dflash:ro
            - /opt/atom/models/qwen-fixed-chat-template/chat_template.jinja:/models/chat_template.jinja:ro
        ipc: host
        entrypoint: ["vllm", "serve"]
        command:
            - /model
            - --served-model-name
            - nvidia-qwen36-35b-a3b-nvfp4-256k
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --trust-remote-code
            - --max-model-len
            - "262144"
            - --gpu-memory-utilization
            - "0.40"
            - --max-num-seqs
            - "2"
            - --max-num-batched-tokens
            - "8192"
            - --reasoning-parser
            - qwen3
            - --reasoning-config
            - '{"reasoning_start_str":"<think>","reasoning_end_str":"</think>"}'
            - --chat-template
            - /models/chat_template.jinja
            - --speculative-config
            - '{"method":"dflash","model":"/dflash","num_speculative_tokens":15}'
            - --enable-auto-tool-choice
            - --tool-call-parser
            - qwen3_coder
        depends_on:
            - llama-swap
        restart: unless-stopped

