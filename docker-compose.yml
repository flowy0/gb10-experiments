    # =========================
    # vLLM - Gemma4 26B FP8 + MTP @ 256k
    # =========================

    vllm-gemma4:
        image: vllm-node-tf5:latest
        container_name: vllm-gemma4-256k
        runtime: nvidia
        shm_size: "64gb"
        ports:
            - "8000:8000"
        volumes:
            - /opt/atom/models/gemma-4-26b-a4b-it-fp8-dynamic:/model:ro
            - /opt/atom/models/gemma-4-26b-a4b-it-assistant:/assistant:ro
            - /opt/atom/models/tool_chat_template_gemma4.jinja:/models/tool_chat_template_gemma4.jinja:ro
        ipc: host
        entrypoint: ["vllm", "serve"]
        command:
            - /model
            - --served-model-name
            - unsloth-gemma4-26b-a4b-fp8-256k-think-mtp
            - --speculative-config
            - '{"method":"mtp","model":"/assistant","num_speculative_tokens":1}'
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --max-model-len
            - "262144"
            - --gpu-memory-utilization
            - "0.4"
            - --max-num-seqs
            - "2"
            - --kv-cache-dtype
            - fp8
            - --load-format
            - safetensors
            - --enforce-eager
            - --reasoning-parser
            - gemma4
            - --chat-template
            - /models/tool_chat_template_gemma4.jinja
            - --default-chat-template-kwargs
            - '{"enable_thinking":true}'
            - --enable-auto-tool-choice
            - --tool-call-parser
            - gemma4
            - --max-num-batched-tokens
            - "8192"
        restart: unless-stopped

