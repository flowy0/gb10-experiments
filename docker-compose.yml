# =========================

  # LiteLLM Router

  # =========================

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    depends_on:
      # - vllm-coder
      - vllm-research
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
      - "--host"
      - "0.0.0.0"
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: librechat-mongodb
    env_file:
      - /opt/atom/.env
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    env_file:
      - /opt/atom/.env
    depends_on:
      - mongodb
      - litellm
    ports:
      - "3080:3080"
    volumes:
      - ./librechat/librechat.yml:/app/librechat.yaml
      - librechat-images:/app/client/public/images
      - librechat-uploads:/app/uploads
      - librechat-logs:/app/api/logs
    environment:
      MONGO_URI: ${MONGO_URI}
      CONFIG_PATH: /app/librechat.yaml
      CREDS_KEY: ${CREDS_KEY}
      CREDS_IV: ${CREDS_IV}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      HOST: 0.0.0.0
      PORT: 3080
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      ALLOW_EMAIL_LOGIN: ${ALLOW_EMAIL_LOGIN:-true}
      ALLOW_SOCIAL_LOGIN: ${ALLOW_SOCIAL_LOGIN:-false}
      ALLOW_SOCIAL_REGISTRATION: ${ALLOW_SOCIAL_REGISTRATION:-false}
      SERPER_API_KEY: ${SERPER_API_KEY}
    restart: unless-stopped

volumes:
  mongo-data:
  librechat-images:
  librechat-uploads:
  librechat-logs:
