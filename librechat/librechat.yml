version: 1.3.9

cache: true

interface:
    webSearch: true
    agents: true

webSearch:
    searchProvider: "serper"
    scraperProvider: "serper"
    rerankerType: "jina"
    serperApiKey: "${SERPER_API_KEY}"
    jinaApiKey: "${JINA_API_KEY}"
    safeSearch: 1
    scraperTimeout: 7500

endpoints:
    custom:
        - name: "Flint Local"
          apiKey: "not-needed"
          baseURL: "http://litellm:4000/v1"

          models:
              default:
                  - "nvidia-qwen36-35b-a3b-nvfp4-256k"
              fetch: true

          titleConvo: true
          titleModel: "nvidia-qwen36-35b-a3b-nvfp4-256k"

          modelDisplayLabel: "Flint (Llama-Swap)"

          # optional but safe
          dropParams:
              - "stop"

    agents:
        disableBuilder: false
        capabilities:
            - "web_search"
            - "tools"
            - "file_search"
            - "context"
