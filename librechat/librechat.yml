version: 1.3.9

cache: true

interface:
    webSearch: true
    agents: true

webSearch:
    searchProvider: "serper"
    scraperProvider: "serper"
    rerankerType: "jina"
    serperApiKey: "${SERPER_API_KEY}"
    jinaApiKey: "${JINA_API_KEY}"
    safeSearch: 1
    scraperTimeout: 7500

endpoints:
    custom:
        - name: "Flint Local"
          apiKey: "not-needed"
          baseURL: "http://llama-swap:8080/v1"

          models:
              default:
                  - "unsloth-gemma4-26b-a4b-qat-128k-think"
              fetch: false

          titleConvo: true
          titleModel: "unsloth-gemma4-26b-a4b-qat-128k-think"

          modelDisplayLabel: "Flint (Llama-Swap)"

          # optional but safe
          dropParams:
              - "stop"

    agents:
        disableBuilder: false
        capabilities:
            - "web_search"
            - "tools"
            - "file_search"
            - "context"
